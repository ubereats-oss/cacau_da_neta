name: cacau_da_neta
description: "Loja online Cacau da Neta"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.4.0
  cloud_firestore: ^6.1.2
  firebase_auth: ^6.2.0
  firebase_storage: ^13.0.6
  cloud_functions: ^6.0.7

  # State Management
  flutter_riverpod: ^2.4.0

  # UI
  google_fonts: ^6.1.0

  # Date/Time
  intl: ^0.19.0

  # Utilities
  uuid: ^4.0.0

  # Local Storage

  cupertino_icons: ^1.0.8

  image_picker: ^1.1.2

  # Importação de planilha
  excel: ^4.0.6
  file_picker: ^8.1.2
  sign_in_with_apple: ^8.1.0
  firebase_messaging: ^16.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  config:
    enable-swift-package-manager: false
  uses-material-design: true
  assets:
    - assets/images/
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logomarca.png"
